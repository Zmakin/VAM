<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Virtual Account Manager</title>
    
    <!-- Add meta tag for Google APIs -->
    <meta name="google-signin-client_id" content="%VITE_GOOGLE_CLIENT_ID%">
    
    <!-- Content Security Policy for Google APIs -->
    <meta http-equiv="Content-Security-Policy" content="
      default-src 'self';
      script-src 'self' 'unsafe-inline' 'unsafe-eval' https://apis.google.com https://www.gstatic.com https://accounts.google.com;
      frame-src 'self' https://accounts.google.com https://content.googleapis.com;
      connect-src 'self' https://www.googleapis.com https://accounts.google.com https://oauth2.googleapis.com;
      style-src 'self' 'unsafe-inline' https://fonts.googleapis.com;
      font-src 'self' https://fonts.gstatic.com;
      img-src 'self' data: https:;
    ">
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
